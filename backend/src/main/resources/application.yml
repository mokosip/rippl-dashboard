spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/rippl}
    username: ${DB_USERNAME:rippl}
    password: ${DB_PASSWORD:rippl}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  security:
    user:
      password: unused

server:
  tomcat:
    max-swallow-size: 2MB

app:
  jwt:
    secret: ${JWT_SECRET}
    session-expiry-days: 7
    magic-link-expiry-minutes: 15
  resend:
    api-key: ${RESEND_API_KEY:re_test}
    from: noreply@ripplup.app
  base-url: ${BASE_URL:http://localhost:8080}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  extension-id: ${EXTENSION_ID:dev-extension-id}
  extension-dev-id: ${EXTENSION_DEV_ID:}
  rate-limit:
    sync-per-minute: 10
    ingestion-per-minute: 10
    ingestion-burst: 30

rippl:
  scoring:
    multipliers:
      writing: 1.4
      coding: 1.7
      research: 1.3
      planning: 1.5
      communication: 1.35
      other: 1.2
    confidence-weights:
      duration: 0.25
      interaction: 0.20
      task-certainty: 0.30
      collector-signal: 0.15
      profile: 0.10
    confidence-thresholds:
      medium: 0.40
      high: 0.70
    min-scorable-ms: 10000
